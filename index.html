<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabat Attendance Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .btn-danger {
            background-color: #e74c3c;
        }
        .btn-danger:hover {
            background-color: #c0392b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #34495e;
            color: white;
        }
        .status-message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            display: none;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sabat Attendance Tracker</h2>
    
    <div id="status-box" class="status-message"></div>

    <!-- Form Input Kehadiran -->
    <form id="attendance-form" style="margin-bottom: 30px;">
        <div class="form-group">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" required placeholder="Masukkan nama...">
        </div>
        <div class="form-group">
            <label for="kategori">Kategori</label>
            <select id="kategori">
                <option value="Anggota">Anggota</option>
                <option value="Simpatisan">Simpatisan</option>
                <option value="Tamu">Tamu</option>
            </select>
        </div>
        <button type="submit" id="submit-btn">Kirim Kehadiran</button>
    </form>

    <hr>

    <h3>Daftar Hadir Hari Ini</h3>
    <button onclick="loadAttendance()">Refresh Data</button>
    
    <table id="attendance-table">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr>
                <td colspan="3" style="text-align: center;">Memuat data dari cloud...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // === GANTI DENGAN URL WEB APP BARU HASIL DEPLOY ULANG ANDA ===
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwm5gD9O6uZE2xu--hyhiIedNuULqwElRSbgq8vXVN8jNILGP_885aJJlGadA1AE1FNDQ/exec"; 

    const statusBox = document.getElementById('status-box');
    const tableBody = document.getElementById('table-body');
    const form = document.getElementById('attendance-form');

    function showStatus(message, isSuccess = true) {
        statusBox.textContent = message;
        statusBox.className = 'status-message ' + (isSuccess ? 'success' : 'error');
        statusBox.style.display = 'block';
        setTimeout(() => { statusBox.style.display = 'none'; }, 4000);
    }

    // Fungsi memuat data dari Apps Script
    async function loadAttendance() {
        tableBody.innerHTML = `<tr><td colspan="3" style="text-align: center;">Memuat data...</td></tr>`;
        try {
            const response = await fetch(APP_SCRIPT_URL);
            // Menggunakan .text() karena Apps Script mengembalikan HTML pembungkus JSON untuk menghindari CORS
            const rawText = await response.text(); 
            const result = JSON.parse(rawText);

            if (result.status === "success") {
                tableBody.innerHTML = "";
                if (result.data.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="3" style="text-align: center;">Belum ada data kehadiran.</td></tr>`;
                    return;
                }
                
                result.data.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row.Nama || '-'}</td>
                        <td>${row.Kategori || '-'}</td>
                        <td>
                            <button class="btn-danger" onclick="deleteAttendance(${row.row_index})">Hapus</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            } else {
                showStatus("Gagal: " + result.message, false);
                tableBody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: red;">Gagal memuat data</td></tr>`;
            }
        } catch (error) {
            console.error(error);
            showStatus("Gagal memuat dari cloud. Silakan cek koneksi/URL script.", false);
            tableBody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: red;">Error memuat dari cloud</td></tr>`;
        }
    }

    // Fungsi mengirim data (Tambah)
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = "Mengirim...";

        const payload = {
            action: "tambah_absen",
            data: {
                "Nama": document.getElementById('nama').value,
                "Kategori": document.getElementById('kategori').value,
                "Waktu": new Date().toLocaleString("id-ID")
            }
        };

        try {
            const response = await fetch(APP_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // Mode aman lintas domain/CORS
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            // Karena menggunakan "no-cors", browser tidak dapat membaca detail respon. 
            // Kita asumsikan berhasil jika tidak terlempar ke blok catch.
            showStatus("Kehadiran berhasil dikirim!");
            form.reset();
            setTimeout(loadAttendance, 1500); // Beri jeda agar Google Sheets selesai menulis sebelum direfresh
        } catch (error) {
            console.error(error);
            showStatus("Gagal mengirim kehadiran.", false);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Kirim Kehadiran";
        }
    });

    // Fungsi menghapus data
    async function deleteAttendance(rowIndex) {
        if (!confirm("Apakah Anda yakin ingin menghapus baris ini?")) return;

        try {
            const response = await fetch(APP_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    action: "hapus_absen",
                    row_index: rowIndex
                })
            });

            showStatus("Permintaan hapus berhasil dikirim!");
            setTimeout(loadAttendance, 1500);
        } catch (error) {
            console.error(error);
            showStatus("Gagal menghapus data.", false);
        }
    }

    // Muat data otomatis saat pertama kali halaman dibuka
    window.onload = loadAttendance;
</script>
</body>
</html>
